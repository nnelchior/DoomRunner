name: Build Windows
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3' # Используем стабильную 6-ю версию
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Install Minizip via vcpkg
        run: |
          vcpkg install minizip:x64-windows
          vcpkg integrate install

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build with QMake
        run: |
          mkdir build
          cd build
          # Явно указываем пути к vcpkg, чтобы не было ошибок линковки
          qmake ../DoomRunner.pro "INCLUDEPATH+=C:/vcpkg/installed/x64-windows/include" "LIBS+=-LC:/vcpkg/installed/x64-windows/lib -lminizip -lzlib"
          nmake release

      - name: Prepare Deployment
        run: |
          mkdir deploy
          copy build\release\DoomRunner.exe deploy\
          # Для Qt6 команда windeployqt работает так же
          windeployqt --release --no-translations --no-compiler-runtime deploy\DoomRunner.exe
          copy "C:/vcpkg/installed/x64-windows/bin/zlib1.dll" deploy\

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoomRunner-v6-Windows
          path: deploy/
