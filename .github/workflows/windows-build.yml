name: Build Windows (MSYS2)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-minizip
            make

      - name: Build project
        run: |
          mkdir build
          cd build
          qmake6 ../DoomRunner.pro CONFIG+=release
          make -j2

      - name: Prepare Deployment
        run: |
          mkdir -p deploy
          cp build/release/DoomRunner.exe deploy/
          
          # 1. Собираем библиотеки Qt
          windeployqt --release --no-translations --no-compiler-runtime deploy/DoomRunner.exe
          
          # 2. Копируем библиотеки компилятора и зависимости (те самые из ошибок)
          cp /ucrt64/bin/libgcc_s_seh-1.dll deploy/
          cp /ucrt64/bin/libstdc++-6.dll deploy/
          cp /ucrt64/bin/libwinpthread-1.dll deploy/
          cp /ucrt64/bin/libminizip-1.dll deploy/
          cp /ucrt64/bin/zlib1.dll deploy/
          
          # 3. Дополнительные библиотеки, которые часто требует Qt6 в MSYS2
          cp /ucrt64/bin/libdouble-conversion.dll deploy/ || true
          cp /ucrt64/bin/libicuin*.dll deploy/ || true
          cp /ucrt64/bin/libicuuc*.dll deploy/ || true
          cp /ucrt64/bin/libicudt*.dll deploy/ || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoomRunner-Full-Pack
          path: deploy/
