name: Build Windows (MSYS2)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-minizip
            make

      - name: Build project
        run: |
          mkdir build
          cd build
          qmake6 ../DoomRunner.pro CONFIG+=release
          make -j2

      - name: Prepare Deployment
        run: |
          mkdir -p deploy
          cp build/release/DoomRunner.exe deploy/
          
          # 1. Основной деплой Qt
          windeployqt --release --no-translations --no-compiler-runtime deploy/DoomRunner.exe
          
          # 2. Копируем ВСЕ потенциальные зависимости из папки bin
          # Мы берем те, что ты уже указал, и те, что обычно идут с ними в комплекте
          cd /ucrt64/bin/
          cp libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll /d/a/DoomRunner/DoomRunner/deploy/
          cp libminizip-1.dll zlib1.dll libbz2-1.dll libfreetype-6.dll /d/a/DoomRunner/DoomRunner/deploy/
          cp libharfbuzz-0.dll libmd4c.dll libpng16-16.dll libgraphite2.dll /d/a/DoomRunner/DoomRunner/deploy/
          cp libdouble-conversion.dll libicuin*.dll libicuuc*.dll libicudt*.dll /d/a/DoomRunner/DoomRunner/deploy/
          cp libpcre2-16-0.dll libpcre2-8-0.dll libzstd.dll libbrotlicommon.dll libbrotlidec.dll /d/a/DoomRunner/DoomRunner/deploy/
          cp libintl-8.dll libiconv-2.dll /d/a/DoomRunner/DoomRunner/deploy/ || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoomRunner-Full-Pack
          path: deploy/
