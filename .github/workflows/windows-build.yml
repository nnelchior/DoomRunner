name: Build Windows (MSYS2)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-minizip
            make

      - name: Build project
        run: |
          mkdir build
          cd build
          qmake6 ../DoomRunner.pro CONFIG+=release
          make -j2

      - name: Prepare Deployment
        run: |
          mkdir -p deploy
          # Исправленный путь: qmake кладет exe в папку release
          cp build/release/DoomRunner.exe deploy/
          windeployqt --release --no-translations --no-compiler-runtime deploy/DoomRunner.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoomRunner-Final-Build
          path: deploy/
