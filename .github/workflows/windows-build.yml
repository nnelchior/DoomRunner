name: Build Windows
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Install Minizip via vcpkg
        run: |
          vcpkg install minizip:x64-windows
          vcpkg integrate install

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build with QMake
        run: |
          mkdir build
          cd build
          # Сообщаем qmake, где лежат заголовочные файлы и библиотеки minizip
          qmake ../DoomRunner.pro "INCLUDEPATH+=C:/vcpkg/installed/x64-windows/include" "LIBS+=-LC:/vcpkg/installed/x64-windows/lib -lminizip"
          nmake release

      - name: Prepare Deployment (Collect DLLs)
        run: |
          mkdir deploy
          copy build\release\DoomRunner.exe deploy\
          # windeployqt копирует нужные Qt-библиотеки, чтобы EXE запускался у тебя
          windeployqt --release --no-translations --no-compiler-runtime deploy\DoomRunner.exe
          # Копируем zlib, которая нужна для minizip
          copy "C:/vcpkg/installed/x64-windows/bin/zlib1.dll" deploy\

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoomRunner-Patched-Windows
          path: deploy/
