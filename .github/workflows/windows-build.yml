name: Build Windows (MSYS2)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-minizip
            make

      - name: Build project
        run: |
          mkdir build
          cd build
          qmake6 ../DoomRunner.pro CONFIG+=release
          make -j2

      - name: Prepare Deployment
        run: |
          mkdir -p deploy
          cp build/release/DoomRunner.exe deploy/
          
          # 1. Сначала стандартный деплой Qt
          windeployqt --release --no-translations --no-compiler-runtime deploy/DoomRunner.exe
          
          # 2. "Ковровая бомбардировка" - копируем все зависимости MSYS2
          # Этот список покрывает GCC, GLib, ICU, Compression и графические либы
          cd /ucrt64/bin/
          cp libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll deploy/
          cp libminizip-1.dll zlib1.dll libbz2-1.dll libglib-2.0-0.dll deploy/
          cp libintl-8.dll libiconv-2.dll libpcre2-8-0.dll libpcre2-16-0.dll deploy/
          cp libfreetype-6.dll libharfbuzz-0.dll libpng16-16.dll libgraphite2.dll deploy/
          cp libdouble-conversion.dll libmd4c.dll libzstd.dll deploy/
          cp libbrotlicommon.dll libbrotlidec.dll deploy/
          
          # 3. Копируем ICU (библиотеки юникода, их много, берем все подходящие)
          cp libicuin*.dll deploy/ || true
          cp libicuuc*.dll deploy/ || true
          cp libicudt*.dll deploy/ || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoomRunner-Final-Pack
          path: deploy/
